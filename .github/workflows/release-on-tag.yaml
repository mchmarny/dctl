name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/test-on-call.yaml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go-env

      - name: Setup Build Tools
        uses: ./.github/actions/setup-build-tools

      - name: Build CLI
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-checksums: dist/checksums-sha256.txt

  copy-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      SOURCE_IMAGE: 'ghcr.io/mchmarny/devpulse'
      ARTIFACT_REGISTRY: 'us-docker.pkg.dev/eidosx/devpulse'
      IDENTITY_PROVIDER: 'projects/116689922666/locations/global/workloadIdentityPools/github-actions-pool-devpulse/providers/github-actions-provider-devpulse'
      PROJECT_ID: 'eidosx'
      SERVICE_ACCOUNT: 'github-actions-devpulse@eidosx.iam.gserviceaccount.com'
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          token_format: access_token
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Configure Docker for Artifact Registry
        shell: bash
        run: |
          REGISTRY_HOST="${ARTIFACT_REGISTRY%%/*}"
          gcloud auth configure-docker "${REGISTRY_HOST}" --quiet

      - name: Install crane
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987  # v0.5

      - name: Authenticate to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          echo "${GHCR_TOKEN}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Copy image to Artifact Registry
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Copying image..."
          echo "  Source: ${SOURCE_IMAGE}:${TAG}"
          echo "  Target: ${ARTIFACT_REGISTRY}/devpulse:${TAG}"
          crane copy "${SOURCE_IMAGE}:${TAG}" "${ARTIFACT_REGISTRY}/devpulse:${TAG}"
          crane copy "${SOURCE_IMAGE}:latest" "${ARTIFACT_REGISTRY}/devpulse:latest"
          echo "Image copied successfully"

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gcloud run services update devpulse \
            --image "${ARTIFACT_REGISTRY}/devpulse:${TAG}" \
            --region us-west1

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - release
      - copy-image
    permissions:
      contents: write
    steps:
      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
